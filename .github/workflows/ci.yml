name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.6.0'
          arch: 'win64_msvc2019_64'

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Run C++ tests
        run: ctest --test-dir build -C Release --output-on-failure

  clang-format:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check C++ formatting
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -Include *.cpp,*.h `
                   -Path src -ErrorAction SilentlyContinue
          if ($files) {
            $result = $files | ForEach-Object {
              clang-format --dry-run --Werror $_.FullName 2>&1
            }
            if ($LASTEXITCODE -ne 0) {
              Write-Error "C++ formatting issues found!"
              exit 1
            }
          }

  python-checks:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install ruff pytest

      - name: Check Python formatting
        run: ruff check scripts/

      - name: Run Python tests
        run: pytest scripts/ -v

  architecture-lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check no SQL outside data layer
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -Include *.cpp,*.h `
                   -Path src/core, src/ui, src/providers `
                   -ErrorAction SilentlyContinue
          if ($files) {
            $found = $files | Select-String `
                     -Pattern "SELECT|INSERT|UPDATE|DELETE"
            if ($found) {
              Write-Error "SQL query found outside data layer!"
              exit 1
            }
          }

      - name: Check Python not importing sqlite3 directly
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -Include *.py `
                   -Path scripts -ErrorAction SilentlyContinue
          if ($files) {
            $found = $files | Select-String -Pattern "import sqlite3"
            if ($found) {
              Write-Error "Python modules must not import sqlite3 directly!"
              exit 1
            }
          }

      - name: Check UI does not include DBManager directly
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -Include *.cpp,*.h `
                   -Path src/ui -ErrorAction SilentlyContinue
          if ($files) {
            $found = $files | Select-String -Pattern '#include.*DBManager'
            if ($found) {
              Write-Error "UI layer must not include DBManager directly!"
              exit 1
            }
          }

      - name: Check data layer has no upward dependencies
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -Include *.cpp,*.h `
                   -Path src/data -ErrorAction SilentlyContinue
          if ($files) {
            $found = $files | Select-String `
                     -Pattern '#include.*(core|ui|providers)/'
            if ($found) {
              Write-Error "Data layer must not depend on other layers!"
              exit 1
            }
          }
